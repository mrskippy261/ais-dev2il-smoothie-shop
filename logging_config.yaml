formatters:
  # Log message format for the console
  console:
    (): uvicorn.logging.DefaultFormatter
    datefmt: '%Y-%m-%d %H:%M:%S'
    fmt: '%(levelname)s - %(asctime)s - %(message)s'

handlers:
  # Loggers with this handler will output to the console
  console:
    class: logging.StreamHandler
    formatter: console
    stream: ext://sys.stdout

# The root logger is going to receive all log events that are not explicitly set to not propagate
root:
  handlers:
  - console
  level: INFO

# Other loggers can be configured optionally if special settings are required
loggers:
  kitchen_service:
    handlers:
    - console
    level: DEBUG
    propagate: false

version: 1
disable_existing_loggers: false